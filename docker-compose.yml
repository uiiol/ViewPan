version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - IS_DOCKER=1
    env_file:
      - backend/.env
    volumes:
      - ./原数据:/app/原数据:ro
      - ./backend/app:/app/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src:ro
